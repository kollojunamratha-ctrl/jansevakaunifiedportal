<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | JanSevak</title>
    <script>
      if (!localStorage.getItem("token") && localStorage.getItem("jansevak-token")) {
        localStorage.setItem("token", localStorage.getItem("jansevak-token"));
        localStorage.removeItem("jansevak-token");
      }

      if (!localStorage.getItem("token")) {
        window.location.replace("/login.html");
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              canvas: "#0b1220",
              panel: "#111a2d",
              accent: "#4ea1ff",
              accentSoft: "#172a48"
            },
            boxShadow: {
              card: "0 20px 60px rgba(0, 0, 0, 0.28)"
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="min-h-screen bg-canvas text-slate-100">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,_rgba(78,161,255,0.22),_transparent_28%),radial-gradient(circle_at_bottom_right,_rgba(31,214,136,0.16),_transparent_22%)]"></div>
    <div id="pageNav" class="border-b border-white/10 bg-[#0d1422]"></div>

    <main class="mx-auto max-w-5xl px-4 py-8 sm:px-6">
      <section class="rounded-3xl border border-white/10 bg-panel/80 p-6 shadow-card sm:p-8">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
          <div>
            <p id="profileEyebrow" class="text-xs font-semibold uppercase tracking-[0.3em] text-accent">Profile</p>
            <h1 id="profileTitle" class="mt-3 text-3xl font-black tracking-tight">Your Profile</h1>
            <p id="profileSubtitle" class="mt-3 max-w-2xl text-sm text-slate-400">
              Manage your personal details for a smoother JanSevak experience.
            </p>
          </div>
          <div class="flex flex-wrap items-center gap-3">
            <select id="languageSelect" class="rounded-full border border-white/10 bg-panel px-4 py-2 text-sm">
              <option value="en">English</option>
              <option value="hi">Hindi</option>
              <option value="te">Telugu</option>
              <option value="ta">Tamil</option>
            </select>
            <div id="sessionControls"></div>
          </div>
        </div>

        <div id="profileStatus" class="mt-6 hidden"></div>

        <section id="profileViewCard" class="mt-8 rounded-3xl border border-white/10 bg-slate-950/30 p-6">
          <p id="profileLoadingText" class="text-sm text-slate-400">Loading your profile...</p>
        </section>

        <section id="profileFormSection" class="mt-8 hidden rounded-3xl border border-white/10 bg-slate-950/30 p-6">
          <form id="profileForm" class="grid gap-4 md:grid-cols-2">
            <label class="block">
              <span id="nameLabel" class="mb-2 block text-sm font-medium text-slate-200">Name</span>
              <input name="name" type="text" class="w-full rounded-2xl border border-white/10 bg-[#0d1320] px-4 py-3 outline-none transition focus:border-accent" />
            </label>
            <label class="block">
              <span id="ageLabel" class="mb-2 block text-sm font-medium text-slate-200">Age</span>
              <input name="age" type="number" min="0" max="120" class="w-full rounded-2xl border border-white/10 bg-[#0d1320] px-4 py-3 outline-none transition focus:border-accent" />
            </label>
            <label class="block">
              <span id="stateLabel" class="mb-2 block text-sm font-medium text-slate-200">State</span>
              <input name="state" type="text" class="w-full rounded-2xl border border-white/10 bg-[#0d1320] px-4 py-3 outline-none transition focus:border-accent" />
            </label>
            <label class="block">
              <span id="phoneLabel" class="mb-2 block text-sm font-medium text-slate-200">Phone</span>
              <input name="phone" type="tel" inputmode="numeric" maxlength="15" class="w-full rounded-2xl border border-white/10 bg-[#0d1320] px-4 py-3 outline-none transition focus:border-accent" />
            </label>
            <label class="block md:col-span-2">
              <span id="addressLabel" class="mb-2 block text-sm font-medium text-slate-200">Address</span>
              <textarea name="address" rows="3" class="w-full rounded-2xl border border-white/10 bg-[#0d1320] px-4 py-3 outline-none transition focus:border-accent"></textarea>
            </label>
            <label class="block md:col-span-2">
              <span id="aadharLabel" class="mb-2 block text-sm font-medium text-slate-200">Aadhar</span>
              <input name="aadhar" type="text" inputmode="numeric" maxlength="12" class="w-full rounded-2xl border border-white/10 bg-[#0d1320] px-4 py-3 outline-none transition focus:border-accent" />
            </label>
            <div class="md:col-span-2 flex flex-wrap gap-3 pt-2">
              <button id="saveProfileButton" type="submit" class="rounded-2xl bg-accent px-5 py-3 text-sm font-semibold text-slate-950 transition hover:brightness-110">
                Save Details
              </button>
              <button id="cancelProfileButton" type="button" class="rounded-2xl border border-white/10 px-5 py-3 text-sm font-semibold text-slate-200 transition hover:border-accent hover:text-white">
                Cancel
              </button>
            </div>
          </form>
        </section>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="/session.js"></script>
    <script src="/navigation.js"></script>
    <script src="/translations.js"></script>
    <script src="/profile.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JanSevak Schemes</title>
    <script>
      if (!localStorage.getItem("token") && localStorage.getItem("jansevak-token")) {
        localStorage.setItem("token", localStorage.getItem("jansevak-token"));
        localStorage.removeItem("jansevak-token");
      }

      if (!localStorage.getItem("token")) {
        window.location.replace("/login.html");
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              canvas: "#0b1220",
              panel: "#111a2d",
              accent: "#4ea1ff",
              accentSoft: "#172a48"
            },
            boxShadow: {
              card: "0 20px 60px rgba(0, 0, 0, 0.28)"
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="min-h-screen bg-canvas text-slate-100">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,_rgba(78,161,255,0.22),_transparent_28%),radial-gradient(circle_at_bottom_right,_rgba(31,214,136,0.16),_transparent_22%)]"></div>
    <div id="pageNav" class="border-b border-white/10 bg-[#0d1422]"></div>
    <main class="mx-auto max-w-7xl px-4 py-10 sm:px-6">
      <section class="rounded-3xl border border-white/10 bg-panel/80 p-6 shadow-card sm:p-8">
        <h1 id="pageHeading" class="text-3xl font-black tracking-tight sm:text-4xl">Schemes</h1>
        <p id="pageSubheading" class="mt-3 text-sm text-slate-400">Loading schemes...</p>
        <div id="cardsGrid" class="mt-8 grid gap-5 md:grid-cols-2 xl:grid-cols-3"></div>
      </section>
    </main>

    <template id="schemeCardTemplate">
      <article class="group overflow-hidden rounded-3xl border border-white/10 bg-panel shadow-card transition hover:-translate-y-1 hover:border-accent/60">
        <img class="scheme-image h-52 w-full object-cover" alt="" loading="lazy" />
        <div class="p-5">
          <span class="category-pill inline-flex rounded-full bg-accentSoft px-3 py-1 text-xs font-semibold text-accent"></span>
          <h2 class="scheme-name mt-3 text-xl font-bold leading-tight"></h2>
          <p class="scheme-description mt-3 line-clamp-4 text-sm leading-6 text-slate-300"></p>
          <div class="mt-5 flex items-center justify-between gap-3 text-xs text-slate-400">
            <span class="state-badge rounded-full border border-white/10 px-3 py-1"></span>
            <span class="text-accent">JanSevak</span>
          </div>
          <div class="mt-4 flex gap-3">
            <button type="button" class="voice-button inline-flex h-11 w-11 items-center justify-center rounded-xl border border-white/10 bg-slate-950/50 text-lg transition hover:border-accent hover:text-accent" aria-label="Listen">🔊</button>
            <a class="view-button inline-flex items-center justify-center rounded-xl bg-accent px-4 py-2 text-sm font-semibold text-slate-950 transition hover:brightness-110">
              View Details
            </a>
          </div>
        </div>
      </article>
    </template>

    <script src="/config.js"></script>
    <script src="/session.js"></script>
    <script src="/navigation.js"></script>
    <script src="/translations.js"></script>
    <script src="/scheme-utils.js"></script>
    <script src="/schemes.js"></script>
  </body>
</html>

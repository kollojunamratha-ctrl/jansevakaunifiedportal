<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | JanSevak</title>
    <script>
      if (!localStorage.getItem("token") && localStorage.getItem("jansevak-token")) {
        localStorage.setItem("token", localStorage.getItem("jansevak-token"));
        localStorage.removeItem("jansevak-token");
      }

      if (localStorage.getItem("token")) {
        window.location.replace("/index.html");
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              canvas: "#0b1220",
              panel: "#111a2d",
              accent: "#4ea1ff",
              accentSoft: "#172a48"
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="min-h-screen bg-canvas text-slate-100">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,_rgba(78,161,255,0.22),_transparent_28%),radial-gradient(circle_at_bottom_right,_rgba(31,214,136,0.16),_transparent_22%)]"></div>
    <div id="pageNav" class="border-b border-white/10 bg-[#0d1422]"></div>
    <header class="border-b border-white/10 bg-[#11192a]/90">
      <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-4 sm:px-6">
        <a href="/login.html" class="flex items-center gap-3">
          <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-accentSoft text-2xl">🏛️</div>
          <p class="text-2xl font-black tracking-tight">JanSevak</p>
        </a>
        <div class="flex flex-wrap items-center gap-3">
          <select id="languageSelect" class="rounded-full border border-white/10 bg-panel px-4 py-2 text-sm">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="te">Telugu</option>
            <option value="ta">Tamil</option>
          </select>
          <div id="sessionControls"></div>
        </div>
      </div>
    </header>

    <main class="mx-auto grid min-h-[calc(100vh-76px)] max-w-6xl place-items-center px-4 py-10 sm:px-6">
      <section class="w-full max-w-md rounded-3xl border border-white/10 bg-panel/90 p-8 shadow-card">
        <p class="text-xs font-semibold uppercase tracking-[0.3em] text-accent">Create Account</p>
        <h1 class="mt-3 text-3xl font-black">Sign up for JanSevak</h1>
        <p class="mt-3 text-sm text-slate-400">Register with your phone number and a secure password.</p>

        <form id="signupForm" class="mt-8 space-y-4">
          <label class="block">
            <span class="mb-2 block text-sm font-medium text-slate-200">Phone Number</span>
            <input name="phone" type="tel" inputmode="numeric" maxlength="15" required class="w-full rounded-2xl border border-white/10 bg-[#0d1320] px-4 py-3 outline-none transition focus:border-accent" placeholder="9876543210" />
          </label>
          <label class="block">
            <span class="mb-2 block text-sm font-medium text-slate-200">Password</span>
            <input name="password" type="password" minlength="6" required class="w-full rounded-2xl border border-white/10 bg-[#0d1320] px-4 py-3 outline-none transition focus:border-accent" placeholder="Create password" />
          </label>
          <button type="submit" class="w-full rounded-2xl bg-accent px-4 py-3 text-sm font-semibold text-slate-950 transition hover:brightness-110">
            Sign Up
          </button>
        </form>

        <div class="mt-4 flex items-center justify-between gap-3 text-sm">
          <a href="/login.html" class="text-slate-300 hover:text-white">Already have an account?</a>
          <a href="/login.html" class="text-accent hover:underline">Login</a>
        </div>

        <div id="formStatus" class="mt-5 hidden"></div>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="/session.js"></script>
    <script src="/navigation.js"></script>
    <script src="/auth-pages.js"></script>
  </body>
</html>
